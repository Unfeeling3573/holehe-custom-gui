name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system deps (tk)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install customtkinter
          python -m pip install -e ./holehe

      - name: Compile check (py_compile)
        run: |
          python -m py_compile gui_holehe.py
          python -m py_compile holehe/holehe/core.py

      - name: Smoke import
        run: |
          python -W default -c "import gui_holehe; print('import_ok')"
