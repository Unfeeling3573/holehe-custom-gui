name: Build App

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system deps (linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          python -m pip install pyinstaller customtkinter
          python -m pip install -e ./holehe

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --clean --windowed \
            --name holehe-workbench \
            --add-data "holehe/holehe:holehe/holehe" \
            gui_holehe.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --clean \
            --name holehe-workbench \
            --add-data "holehe/holehe:holehe/holehe" \
            gui_holehe.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --noconfirm --clean --windowed `
            --name holehe-workbench `
            --add-data "holehe\\holehe;holehe\\holehe" `
            gui_holehe.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: holehe-workbench-${{ runner.os }}
          path: |
            dist/**
